<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHEEL WONDERS // JDM LEGACY</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* --- CORE AESTHETIC --- */
        :root {
            --bronze: #c7a87b;
            --sakura: #ffb7c5;
            --sakura-dim: #ff8ea6;
            --dark: #0f0f0f;
            --panel: #161616;
            --neon-glitch: #0ff;
        }

        body {
            background-color: var(--dark);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            margin: 0;
            cursor: default;
        }

        /* --- MOUSE SPOTLIGHT --- */
        .spotlight {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(800px circle at var(--x) var(--y), rgba(255,255,255,0.04), transparent 40%);
            mix-blend-mode: overlay;
        }

        /* BACKGROUND LAYERS */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -2;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.6;
        }

        /* SAKURA ENGINE */
        #sakura-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .sakura-petal {
            position: absolute;
            background: linear-gradient(to bottom right, var(--sakura), var(--sakura-dim));
            border-radius: 100% 0 100% 0;
            opacity: 0.8;
            animation: fall linear infinite, sway ease-in-out infinite alternate;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        @keyframes sway { from { margin-left: -20px; } to { margin-left: 20px; } }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            position: absolute;
            top: 0; width: 100%; z-index: 100;
            box-sizing: border-box;
        }

        .nav-logo img {
            height: 45px; 
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .menu-btn, #cart-btn {
            font-size: 1.2rem;
            color: var(--bronze);
            transition: 0.3s;
            cursor: pointer;
        }
        .menu-btn:hover, #cart-btn:hover { color: var(--sakura); }

        /* --- HERO SECTION --- */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            position: relative;
            background: radial-gradient(circle at 80% 50%, rgba(30,30,30,0.6) 0%, rgba(10,10,10,1) 90%);
            overflow: hidden;
            border-bottom: 2px solid var(--bronze);
        }

        .hero-content {
            z-index: 2;
            position: relative;
        }

        /* --- CRT GLITCH TITLE EFFECT --- */
        .hero h1 {
            font-family: 'Chakra Petch', sans-serif;
            font-size: clamp(4rem, 10vw, 9rem);
            line-height: 0.9;
            font-weight: 700;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
            position: relative;
        }

        .hero h1::before, .hero h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
        }

        .hero h1::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .hero h1::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(14px, 9999px, 121px, 0); }
            20% { clip: rect(66px, 9999px, 96px, 0); }
            40% { clip: rect(22px, 9999px, 14px, 0); }
            60% { clip: rect(83px, 9999px, 2px, 0); }
            80% { clip: rect(29px, 9999px, 86px, 0); }
            100% { clip: rect(56px, 9999px, 49px, 0); }
        }
        
        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 109px, 0); }
            20% { clip: rect(9px, 9999px, 66px, 0); }
            40% { clip: rect(35px, 9999px, 2px, 0); }
            60% { clip: rect(86px, 9999px, 15px, 0); }
            80% { clip: rect(12px, 9999px, 48px, 0); }
            100% { clip: rect(100px, 9999px, 89px, 0); }
        }

        .hero h1 .highlight {
            color: transparent;
            -webkit-text-stroke: 1px var(--bronze);
        }

        .hero-badges {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .subtitle {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* --- CATALOG --- */
        .catalog {
            padding: 100px 5%;
            background: #0a0a0a;
            position: relative;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 60px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        
        .section-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 2.5rem;
            margin-right: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* --- CARDS --- */
        .tier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-bottom: 100px;
        }

        .card {
            background: var(--panel);
            position: relative;
            transform-style: preserve-3d;
            transform: perspective(1000px);
            border-left: 2px solid rgba(255,255,255,0.05);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .card-inner {
            padding: 20px;
            transform: translateZ(20px);
        }

        .card-img-container {
            width: 100%;
            height: 200px;
            background: #000;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
            filter: grayscale(100%);
        }
        .card:hover .card-img { filter: grayscale(0%); transform: scale(1.1); }

        .card h3 {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.6rem;
            margin: 0;
            line-height: 1;
            letter-spacing: 0.5px;
        }

        .card p {
            color: var(--bronze);
            font-size: 0.9rem;
            margin-top: 5px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex; 
            justify-content: space-between;
            font-weight: 700;
        }

        .buy-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* --- NEW TIER COLORS --- */
        .budget-tier .section-title { color: #a0a0a0; }
        .collectors-tier .section-title { color: var(--bronze); }
        .pinnacle-tier .section-title { color: #ffd700; }
        .premium-tier .section-title { color: var(--neon-glitch); text-shadow: 0 0 10px var(--neon-glitch); }
        
        /* The Pinnacle Custom Styling */
        .pinnacle-tier .card {
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: linear-gradient(135deg, rgba(20,20,20,1), rgba(40,35,10,1));
        }

        /* Hot Wheels Premium Custom Styling */
        .premium-tier .card {
            border: 1px solid rgba(0, 255, 255, 0.3);
            background: linear-gradient(135deg, rgba(10,10,15,1), rgba(0,30,30,1));
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.05);
        }

        .section-divider {
            text-align: center;
            color: #fff;
            font-family: 'Chakra Petch', sans-serif;
            letter-spacing: 8px;
            font-size: 2rem;
            margin-bottom: 60px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="spotlight"></div>
    <div id="sakura-container"></div>

    <nav>
        <div class="nav-logo">
            <img src="images/logo.png" alt="Wheel Wonders">
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div id="cart-btn" style="cursor:pointer; font-family: 'Chakra Petch', sans-serif; font-weight: bold; letter-spacing: 1px;">
                GARAGE (<span id="cart-count" style="color: var(--sakura);">0</span>)
            </div>
            <div class="menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div id="cart-panel" style="position: fixed; top: 80px; right: 50px; background: var(--panel); border: 1px solid var(--bronze); padding: 25px; z-index: 200; display: none; min-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
        <h3 style="margin-top:0; color: #fff; font-family: 'Chakra Petch', sans-serif; border-bottom: 1px solid #333; padding-bottom: 10px;">YOUR GARAGE</h3>
        <ul id="cart-items" style="list-style: none; padding: 0; font-size: 0.9rem;"></ul>
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-top: 20px;">
            <span>TOTAL:</span>
            <span style="color: var(--sakura);">$<span id="cart-total">0.00</span></span>
        </div>
        <button id="checkout-btn" onclick="window.location.href='billing.html'" class="buy-btn" style="margin-top: 20px; background: var(--bronze); color: #000; border: none;">PROCEED TO BILLING</button>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1 data-text="WHEEL WONDERS">
                <span class="highlight">WHEEL</span><br>
                WONDERS
            </h1>
            
            <div class="hero-badges">
                <div class="subtitle">// EST. 2024 // JDM COLLECTION</div>
            </div>
        </div>
    </section>

    <div class="catalog">

        <div class="section-divider">// HOTWHEELS MAINLINES //</div>

        <div class="budget-tier">
            <div class="section-header">
                <h2 class="section-title">01 // BUDGET SLEEPER</h2>
                <div style="flex-grow:1; height:1px; background: #333;"></div>
            </div>
            <div class="tier-grid" id="grid-budget"></div>
        </div>

        <div class="collectors-tier">
            <div class="section-header">
                <h2 class="section-title">02 // THE COLLECTORS CUT</h2>
                <div style="flex-grow:1; height:1px; background: #333;"></div>
            </div>
            <div class="tier-grid" id="grid-collectors"></div>
        </div>

        <div class="pinnacle-tier">
            <div class="section-header">
                <h2 class="section-title">03 // THE PINNACLE</h2>
                <div style="flex-grow:1; height:1px; background: #333;"></div>
            </div>
            <div class="tier-grid" id="grid-pinnacle"></div>
        </div>

        <div class="section-divider" style="color: var(--neon-glitch); text-shadow: 0 0 10px rgba(0,255,255,0.4); margin-top: 100px;">// EXCLUSIVES //</div>

        <div class="premium-tier">
            <div class="section-header">
                <h2 class="section-title">04 // HOT WHEELS PREMIUM</h2>
                <div style="flex-grow:1; height:1px; background: #333;"></div>
            </div>
            <div class="tier-grid" id="grid-premium"></div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <script>
        /* --- MOUSE TRACKING SPOTLIGHT --- */
        const spotlight = document.querySelector('.spotlight');

        document.addEventListener('mousemove', (e) => {
            spotlight.style.setProperty('--x', e.clientX + 'px');
            spotlight.style.setProperty('--y', e.clientY + 'px');
        });

        /* --- SAKURA ENGINE --- */
        const container = document.getElementById('sakura-container');
        
        function spawnPetal() {
            const petal = document.createElement('div');
            petal.classList.add('sakura-petal');
            
            const size = Math.random() * 10 + 5 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = Math.random() * 100 + 'vw';
            const fallTime = Math.random() * 10 + 10 + 's';
            
            petal.style.animationDuration = `${fallTime}, 4s`;
            
            container.appendChild(petal);
            
            setTimeout(() => petal.remove(), parseFloat(fallTime) * 1000);
        }
        
        setInterval(spawnPetal, 500);
    </script>

    <script src="script.js"></script>
</body>
</html>
