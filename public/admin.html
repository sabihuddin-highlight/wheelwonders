<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN VAULT // WHEEL WONDERS</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bronze: #c7a87b; --dark: #0f0f0f; --panel: #161616; --danger: #ff4444; --success: #00C851; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; padding: 40px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: var(--panel); padding: 30px; border-top: 3px solid var(--bronze); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { font-family: 'Chakra Petch'; text-align: center; color: var(--bronze); letter-spacing: 2px; }
        
        #login-screen { text-align: center; margin-top: 50px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; font-family: 'Rajdhani'; font-size: 1rem; }
        input:focus, select:focus { outline: none; border-color: var(--bronze); }
        
        button { width: 100%; padding: 15px; background: var(--bronze); color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; font-family: 'Chakra Petch'; transition: 0.3s;}
        button:hover { background: #fff; }
        
        .btn-danger { background: var(--danger); color: #fff; padding: 10px; width: auto; font-size: 0.9rem; }
        .btn-danger:hover { background: #cc0000; color: #fff;}

        #dashboard { display: none; }
        .tab-nav { display: flex; margin-bottom: 30px; border-bottom: 1px solid #333; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 15px; font-size: 1.1rem; flex: 1; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--bronze); border-bottom: 3px solid var(--bronze); background: rgba(199, 168, 123, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .inventory-list { margin-top: 20px; }
        .inventory-item { display: flex; justify-content: space-between; background: #0a0a0a; padding: 15px; margin-bottom: 10px; border: 1px solid #222; align-items: center;}
        
        .stock-controls { display: flex; align-items: center; gap: 10px; background: #161616; padding: 5px 10px; border: 1px solid #333; border-radius: 4px; margin-right: 15px; }
        .btn-stock { background: transparent; color: var(--bronze); border: 1px solid var(--bronze); width: 30px; height: 30px; padding: 0; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; border-radius: 3px; }
        .btn-stock:hover { background: var(--bronze); color: #000; }
        .stock-number { font-weight: bold; font-size: 1.2rem; min-width: 30px; text-align: center; font-family: 'Chakra Petch'; color: #fff; }

        .order-card { background: #0a0a0a; border: 1px solid #333; padding: 20px; margin-bottom: 15px; border-left: 3px solid var(--bronze); }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding-bottom: 10px; margin-bottom: 15px; }
        .order-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 0.95rem; }
        .order-items { background: #000; padding: 10px; border: 1px solid #222; margin-top: 15px; }
        .order-items ul { margin: 5px 0 0 0; padding-left: 20px; color: #ccc; }
    </style>
</head>
<body>

    <div class="container">
        <h1>// SYSTEM OVERRIDE //</h1>
        
        <div id="login-screen">
            <p style="color: #888;">Enter Master Passcode to access the inventory vault.</p>
            <input type="password" id="admin-pass" placeholder="Enter Passcode...">
            <button onclick="checkAccess()">UNLOCK VAULT</button>
        </div>

        <div id="dashboard">
            <div class="tab-nav">
                <button class="tab-btn active" id="btn-inventory" onclick="switchTab('inventory')"><i class="fas fa-car"></i> GARAGE INVENTORY</button>
                <button class="tab-btn" id="btn-orders" onclick="switchTab('orders')"><i class="fas fa-file-invoice-dollar"></i> ORDER MANIFEST</button>
            </div>

            <div id="inventory" class="tab-content active">
                <h3 style="color: var(--bronze); font-family: 'Chakra Petch'; margin-top: 0;">INJECT NEW UNIT</h3>
                <form id="add-car-form">
                    <div class="form-row">
                        <input type="text" id="car-name" placeholder="Car Name (e.g., Nissan Skyline R34)" required>
                        <input type="text" id="car-subtitle" placeholder="Subtitle (e.g., V12 speedster / Aston martin)" required>
                    </div>
                    
                    <div class="form-row">
                        <input type="number" id="car-price" placeholder="Price in RS" required>
                        <input type="number" id="car-stock" placeholder="Initial Stock QTY" required min="1">
                    </div>
                    
                    <div class="form-row">
                        <select id="car-category" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="JDM">JDM</option>
                            <option value="Euro">Euro</option>
                            <option value="Muscle">Muscle</option>
                        </select>
                        <select id="car-tier" required>
                            <option value="" disabled selected>Select Tier Level</option>
                            <option value="budget">01 // Budget Sleeper</option>
                            <option value="collectors">02 // The Collectors Cut</option>
                            <option value="pinnacle">03 // The Pinnacle</option>
                            <option value="premium">04 // Hot Wheels Premium</option>
                        </select>
                    </div>
                    
                    <input type="text" id="car-image" placeholder="Image URL (e.g., images/skyline.jpg)" required>
                    <button type="submit">INJECT TO DATABASE</button>
                </form>

                <div class="inventory-list">
                    <div id="live-inventory"></div>
                </div>
            </div>

            <div id="orders" class="tab-content">
                <div id="live-orders"></div>
            </div>
        </div>
    </div>

    <script>
        let secretKey = "";

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        function checkAccess() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "FURQAN_ADMIN_2026") {
                secretKey = pass;
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                loadInventory();
                loadOrders(); 
            } else {
                alert("ACCESS DENIED: Incorrect Passcode.");
            }
        }

        document.getElementById('add-car-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newCar = {
                name: document.getElementById('car-name').value,
                subtitle: document.getElementById('car-subtitle').value, // SYNCED
                price: parseFloat(document.getElementById('car-price').value),
                stock: parseInt(document.getElementById('car-stock').value),
                category: document.getElementById('car-category').value,
                tier: document.getElementById('car-tier').value,
                image: document.getElementById('car-image').value
            };

            try {
                const res = await fetch('/api/admin/inventory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-pass': secretKey },
                    body: JSON.stringify(newCar)
                });
                if (res.ok) {
                    document.getElementById('add-car-form').reset();
                    loadInventory(); 
                } else {
                    alert("System Error: Could not add car.");
                }
            } catch (err) { console.error(err); }
        });

        async function loadInventory() {
            const res = await fetch('/api/inventory');
            const cars = await res.json();
            const container = document.getElementById('live-inventory');
            container.innerHTML = "";

            cars.forEach(car => {
                const currentStock = car.stock !== undefined ? car.stock : 0; 
                const safePrice = car.price ? Number(car.price).toLocaleString() : '0';
                const safeTier = car.tier ? car.tier.toUpperCase() : 'NO TIER'; 

                container.innerHTML += `
                    <div class="inventory-item">
                        <div>
                            <strong style="font-size: 1.1rem;">${car.name}</strong> <br>
                            <span style="color: #888;">${car.subtitle || 'NO SUBTITLE'}</span> <br>
                            <span style="color: var(--bronze);">RS ${safePrice} | ${safeTier}</span>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <div class="stock-controls">
                                <button class="btn-stock" onclick="updateStock('${car._id}', -1)">-</button>
                                <span class="stock-number">${currentStock}</span>
                                <button class="btn-stock" onclick="updateStock('${car._id}', 1)">+</button>
                            </div>
                            <button class="btn-danger" onclick="deleteCar('${car._id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        async function updateStock(id, changeAmount) {
            try {
                const res = await fetch(`/api/admin/inventory/${id}/stock`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-admin-pass': secretKey },
                    body: JSON.stringify({ change: changeAmount })
                });
                if(res.ok) { loadInventory(); } 
            } catch(err) { console.error(err); }
        }

        async function deleteCar(id) {
            if(!confirm("CRUSH UNIT?")) return;
            await fetch(`/api/admin/inventory/${id}`, {
                method: 'DELETE',
                headers: { 'x-admin-pass': secretKey }
            });
            loadInventory();
        }

        async function loadOrders() {
            try {
                const res = await fetch('/api/admin/orders', { headers: { 'x-admin-pass': secretKey } });
                const orders = await res.json();
                const container = document.getElementById('live-orders');
                container.innerHTML = "";
                
                if (orders.length === 0) {
                    container.innerHTML = "<p style='color: #888; text-align: center;'>No orders yet.</p>";
                    return;
                }
                
                orders.forEach(order => {
                    let itemsList = order.cart.map(item => `<li>${item.name} (x${item.quantity})</li>`).join('');
                    container.innerHTML += `
                        <div class="order-card">
                            <div class="order-header">
                                <strong style="color: var(--bronze);">${order.orderId}</strong>
                                <span style="color: #888;">${order.date}</span>
                            </div>
                            <div class="order-grid">
                                <div><strong>${order.customer.name.toUpperCase()}</strong><br><span>${order.customer.phone}</span></div>
                                <div style="text-align: right;"><strong style="color: var(--success);">RS ${order.total.toLocaleString()}</strong></div>
                            </div>
                            <div class="order-items"><ul>${itemsList}</ul></div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
