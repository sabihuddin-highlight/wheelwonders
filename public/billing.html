<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILLING // WHEEL WONDERS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { 
            --bronze: #c7a87b; 
            --sakura: #ffb7c5; 
            --dark: #0f0f0f; 
            --panel: #161616; 
        }
        
        body { 
            background-color: var(--dark); 
            color: #e0e0e0; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
        }

        .checkout-container { 
            background: var(--panel); 
            padding: 40px; 
            border-top: 3px solid var(--sakura); 
            max-width: 700px; 
            width: 100%; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        h1 { 
            font-family: 'Chakra Petch', sans-serif; 
            margin-top: 0; 
            text-align: center; 
            font-size: 2.5rem; 
            letter-spacing: 2px; 
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        /* Order Summary Box */
        .order-summary {
            background: #0a0a0a;
            padding: 20px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }

        .back-btn { 
            display: inline-block; 
            margin-top: 20px; 
            color: #888; 
            text-decoration: none; 
            transition: 0.3s; 
            font-family: 'Chakra Petch', sans-serif;
            text-transform: uppercase;
        }
        .back-btn:hover { color: #fff; }

        /* Input Styles */
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--sakura) !important;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>SECURE CHECKOUT</h1>
        
        <div class="order-summary">
            <h3 style="margin-top: 0; color: #aaa; font-family: 'Chakra Petch', sans-serif;">ORDER INVOICE</h3>
            <ul id="billing-items" style="list-style: none; padding: 0; margin: 0 0 20px 0; font-size: 1.1rem;"></ul>
            <div style="text-align: right; font-size: 1.5rem; border-top: 1px dashed #555; padding-top: 15px; font-weight: bold;">
                AMOUNT DUE: <span style="color: var(--sakura); margin-left: 15px;">$<span id="display-total">0.00</span></span>
            </div>
        </div>

        <div style="background: rgba(0,0,0,0.5); padding: 20px; border: 1px solid #333; margin-bottom: 20px;">
            <h3 style="color: var(--bronze); font-family: 'Chakra Petch', sans-serif; margin-top: 0;">DELIVERY LOGISTICS</h3>
            
            <input type="text" id="cust-name" placeholder="Full Name" required style="width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box;">
            
            <input type="tel" id="cust-phone" placeholder="Phone Number" required style="width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box;">
            
            <textarea id="cust-address" placeholder="Full Shipping Address" required style="width: 100%; padding: 10px; height: 80px; background: #000; border: 1px solid #444; color: #fff; font-family: 'Rajdhani', sans-serif; box-sizing: border-box;"></textarea>
            
            <select id="payment-method" style="width: 100%; padding: 10px; margin-top: 10px; background: #000; border: 1px solid #444; color: var(--bronze); font-weight: bold;">
                <option value="Cash on Delivery">Cash on Delivery (COD)</option>
                <option value="Bank Transfer">Bank Transfer (Send Screenshot via WhatsApp)</option>
            </select>
        </div>

        <button id="submit-order-btn" style="width: 100%; padding: 15px; background: var(--bronze); color: #000; font-family: 'Chakra Petch', sans-serif; font-size: 1.2rem; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s;">
            CONFIRM & PLACE ORDER
        </button>

        <a href="index.html" class="back-btn" style="display: block; text-align: center;"><i class="fas fa-arrow-left"></i> RETURN TO GARAGE</a>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('jdm_cart')) || [];
        const billingItems = document.getElementById('billing-items');
        let finalTotal = 0;
        
        // Display Cart Items
        if (cart.length === 0) {
            billingItems.innerHTML = "<li style='color: red;'>Your garage is empty.</li>";
            document.getElementById('submit-order-btn').disabled = true;
            document.getElementById('submit-order-btn').style.opacity = "0.5";
        } else {
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                finalTotal += itemTotal;
                billingItems.innerHTML += `
                    <li style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: var(--bronze);">${item.name} (x${item.quantity})</span>
                        <span>$${itemTotal.toFixed(2)}</span>
                    </li>`;
            });
            document.getElementById('display-total').innerText = finalTotal.toFixed(2);
        }

        // Add hover effect to button
        const submitBtn = document.getElementById('submit-order-btn');
        submitBtn.addEventListener('mouseover', () => { if(!submitBtn.disabled) submitBtn.style.background = "#fff"; });
        submitBtn.addEventListener('mouseout', () => { if(!submitBtn.disabled) submitBtn.style.background = "var(--bronze)"; });

        // Handle Order Submission
        submitBtn.addEventListener('click', async () => {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('cust-address').value;
            const paymentMethod = document.getElementById('payment-method').value;

            if(!name || !phone || !address) {
                return alert("Please fill out all delivery logistics!");
            }

            // Package the order data
            const orderData = {
                customer: { name, phone, address },
                payment: paymentMethod,
                total: finalTotal,
                cart: cart
            };

            // Send to our Node.js Server
            try {
                // Change button state to show it's working
                submitBtn.innerText = "PROCESSING...";
                submitBtn.disabled = true;

                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                const result = await response.json();

                if (result.success) {
                    // Empty the cart
                    localStorage.removeItem('jdm_cart');
                    
                    // Generate WhatsApp message for Admin alert
                    // IMPORTANT: Replace the '12345678900' below with your actual business number!
                    let waText = `🏎️ *NEW ORDER: ${result.orderId}* 🏎️%0A%0A`;
                    waText += `*Name:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${address}%0A*Method:* ${paymentMethod}%0A%0A*Total:* $${finalTotal.toFixed(2)}`;
                    
                    alert(`Success! Your order ID is ${result.orderId}. Taking you to WhatsApp to confirm.`);
                    
                    // Open WhatsApp to send receipt
                    window.location.href = `https://wa.me/12345678900?text=${waText}`; 
                } else {
                    alert("Error: " + result.error); // Alerts if item is out of stock
                    submitBtn.innerText = "CONFIRM & PLACE ORDER";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert("Server error processing order. Please ensure the server is running.");
                submitBtn.innerText = "CONFIRM & PLACE ORDER";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
